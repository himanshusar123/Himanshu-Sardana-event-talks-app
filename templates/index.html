<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigQuery Release Notes Hub</title>
    <meta name="description" content="Explore and tweet the latest Google Cloud BigQuery release notes and updates.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="/static/style.css">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo-container">
                <div class="logo-icon">
                    <i class="fa-solid fa-database"></i>
                </div>
                <div class="logo-text">
                    <h1>BigQuery</h1>
                    <span>Release Notes Hub</span>
                </div>
            </div>
            <div class="header-actions">
                <button id="refresh-btn" class="btn btn-primary" title="Refresh Release Notes">
                    <i id="refresh-icon" class="fa-solid fa-arrows-rotate"></i>
                    <span>Refresh</span>
                </button>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="app-body">
            <!-- Sidebar: Controls & Tweet Composer -->
            <aside class="app-sidebar">
                <!-- Search & Filters -->
                <div class="sidebar-section search-filters">
                    <h2><i class="fa-solid fa-sliders"></i> Filter Notes</h2>
                    <div class="search-box">
                        <i class="fa-solid fa-magnifying-glass search-icon"></i>
                        <input type="text" id="search-input" placeholder="Search release notes...">
                    </div>
                    <div class="filter-group">
                        <label>Filter by Type</label>
                        <div class="filter-tags">
                            <button class="filter-tag active" data-type="all">All</button>
                            <button class="filter-tag" data-type="Feature">Feature</button>
                            <button class="filter-tag" data-type="Announcement">Announcement</button>
                            <button class="filter-tag" data-type="Issue">Issue</button>
                            <button class="filter-tag" data-type="Deprecation">Deprecation</button>
                        </div>
                    </div>
                </div>

                <!-- Tweet Composer Widget -->
                <div class="sidebar-section tweet-composer-widget">
                    <div class="section-header">
                        <h2><i class="fa-brands fa-x-twitter"></i> Tweet Composer</h2>
                        <button id="clear-composer" class="btn-text" title="Clear selection">Clear</button>
                    </div>
                    <div class="selected-meta" id="selected-meta">
                        <span class="placeholder-text">Select a release note to draft a tweet.</span>
                    </div>
                    <div class="composer-body">
                        <textarea id="tweet-textarea" placeholder="Select an update, or start typing here to compose a tweet..." maxlength="280" disabled></textarea>
                        <div class="composer-footer">
                            <div class="char-counter">
                                <svg class="progress-ring" width="24" height="24">
                                    <circle class="progress-ring-bg" stroke="#1f2937" stroke-width="2.5" fill="transparent" r="10" cx="12" cy="12" />
                                    <circle id="char-progress" class="progress-ring-circle" stroke="#8b5cf6" stroke-width="2.5" fill="transparent" r="10" cx="12" cy="12" />
                                </svg>
                                <span id="char-count">280</span>
                            </div>
                            <button id="tweet-btn" class="btn btn-tweet" disabled>
                                <i class="fa-brands fa-x-twitter"></i> Post to X
                            </button>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Main Timeline / Cards List -->
            <section class="notes-container">
                <div class="notes-header">
                    <div class="results-info">
                        <span id="results-count">Showing 0 updates</span>
                        <span id="last-updated-time" class="timestamp"></span>
                    </div>
                    <div class="view-options">
                        <!-- Group by date or display list -->
                    </div>
                </div>

                <!-- Release Notes Feed -->
                <div id="release-notes-feed" class="release-notes-feed">
                    <!-- Skeleton Loader initially visible -->
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                </div>
            </section>
        </main>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast">
        <i class="fa-solid fa-circle-check toast-icon"></i>
        <span id="toast-message">Copied to composer!</span>
    </div>

    <!-- Scripts -->
    <script src="/static/app.js"></script>
</body>
</html>
